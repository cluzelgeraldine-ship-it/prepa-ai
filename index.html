<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prépa IA · Grand Oral</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1510;
    --parchment: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8d5a0;
    --rouge: #8b2020;
    --cream: #faf7f2;
    --muted: #7a6f62;
    --border: rgba(201,168,76,0.3);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HERO */
  .hero {
    background: var(--ink);
    padding: 60px 40px 50px;
    text-align: center;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 70%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(201,168,76,0.05) 39px, rgba(201,168,76,0.05) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(201,168,76,0.05) 39px, rgba(201,168,76,0.05) 40px);
    pointer-events: none;
  }
  .hero-badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid var(--border);
    padding: 5px 14px;
    border-radius: 2px;
    margin-bottom: 20px;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 5vw, 52px);
    font-weight: 400;
    color: var(--parchment);
    line-height: 1.1;
    letter-spacing: -0.02em;
  }
  .hero h1 em {
    color: var(--gold);
    font-style: italic;
  }
  .hero p {
    margin-top: 14px;
    color: rgba(245,240,232,0.6);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  /* MAIN LAYOUT */
  .app {
    display: flex;
    flex-direction: column;
    flex: 1;
    max-width: 780px;
    margin: 0 auto;
    width: 100%;
    padding: 0 20px;
  }

  /* CONTEXT BAR */
  .context-bar {
    display: flex;
    gap: 10px;
    padding: 18px 0;
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-shrink: 0;
  }
  .context-bar input {
    flex: 1;
    background: white;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 9px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .context-bar input:focus { border-color: var(--gold); }
  .context-bar input::placeholder { color: var(--muted); }
  .context-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }

  /* CHAT */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 0;
    display: flex;
    flex-direction: column;
    gap: 20px;
    min-height: 300px;
    max-height: 460px;
  }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-track { background: transparent; }
  .chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    display: flex;
    gap: 14px;
    animation: fadeUp 0.3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .avatar.jury {
    background: var(--ink);
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
  }
  .avatar.student {
    background: var(--gold-light);
    color: var(--ink);
    font-size: 13px;
    font-weight: 500;
  }

  .bubble {
    max-width: 82%;
    padding: 13px 17px;
    line-height: 1.65;
    font-size: 14px;
    border-radius: 2px;
  }
  .msg.jury .bubble {
    background: white;
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    color: var(--ink);
  }
  .msg.user .bubble {
    background: var(--ink);
    color: var(--parchment);
  }

  .score-card {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .score-item {
    background: var(--cream);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 6px 12px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .score-item .label { color: var(--muted); }
  .score-item .val { font-weight: 500; color: var(--ink); }
  .score-item .val.high { color: #2d6a2d; }
  .score-item .val.mid { color: #a06820; }
  .score-item .val.low { color: var(--rouge); }

  /* TYPING */
  .typing-indicator {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 13px 17px;
    background: white;
    border: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    border-radius: 2px;
    width: fit-content;
  }
  .dot {
    width: 6px; height: 6px;
    background: var(--gold);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* INPUT */
  .input-area {
    padding: 18px 0 24px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: white;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 11px 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    resize: none;
    min-height: 48px;
    max-height: 120px;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.5;
  }
  .input-area textarea:focus { border-color: var(--gold); }
  .input-area textarea::placeholder { color: var(--muted); }

  .send-btn {
    background: var(--ink);
    color: var(--gold);
    border: none;
    border-radius: 3px;
    width: 48px;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #2d2620; }
  .send-btn:disabled { opacity: 0.4; cursor: default; }

  .reset-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--rouge); color: var(--rouge); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty-state p { font-size: 13px; font-style: italic; font-family: 'Playfair Display', serif; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">Prépa IA · Grand Oral</div>
  <h1>Votre jury<br><em>virtuel</em> vous attend.</h1>
  <p>Simulation d'entretien · Feedback instantané · Méthode éprouvée</p>
</div>

<div class="app">
  <div class="context-bar">
    <span class="context-label">Sujet</span>
    <input type="text" id="subject" placeholder="Ex : Le droit à l'oubli à l'ère numérique" />
    <button class="reset-btn" onclick="resetChat()">↺ Nouveau</button>
  </div>

  <div class="chat" id="chat">
    <div class="empty-state">
      <div class="icon">⚖️</div>
      <p>Renseignez votre sujet ci-dessus,<br>puis présentez-vous au jury.</p>
    </div>
  </div>

  <div class="input-area">
    <textarea id="userInput" placeholder="Votre réponse au jury…" rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
  let history = [];
  let isLoading = false;
  let exchangeCount = 0;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function resetChat() {
    history = [];
    exchangeCount = 0;
    document.getElementById('chat').innerHTML = `
      <div class="empty-state">
        <div class="icon">⚖️</div>
        <p>Renseignez votre sujet ci-dessus,<br>puis présentez-vous au jury.</p>
      </div>`;
  }

  function appendMsg(role, content, scores) {
    const chat = document.getElementById('chat');
    const empty = chat.querySelector('.empty-state');
    if (empty) empty.remove();

    const div = document.createElement('div');
    div.className = `msg ${role === 'assistant' ? 'jury' : 'user'}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'assistant' ? 'jury' : 'student'}`;
    avatar.textContent = role === 'assistant' ? 'J' : 'E';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = content;

    if (scores && role === 'assistant') {
      const card = document.createElement('div');
      card.className = 'score-card';
      for (const [k, v] of Object.entries(scores)) {
        const cls = v >= 15 ? 'high' : v >= 10 ? 'mid' : 'low';
        card.innerHTML += `<div class="score-item"><span class="label">${k}</span><span class="val ${cls}">${v}/20</span></div>`;
      }
      bubble.appendChild(card);
    }

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const wrap = document.createElement('div');
    wrap.className = 'msg jury';
    wrap.id = 'typing';
    const av = document.createElement('div');
    av.className = 'avatar jury';
    av.textContent = 'J';
    const ind = document.createElement('div');
    ind.className = 'typing-indicator';
    ind.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
    wrap.appendChild(av);
    wrap.appendChild(ind);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function callAPI(messages, subject) {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages,
        subject: subject || '',
        context: 'Étudiant préparant le Grand Oral du Baccalauréat',
        mode: 'GRAND ORAL'
      })
    });
    return await res.json();
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    const subject = document.getElementById('subject').value.trim();
    const text = input.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    btn.disabled = true;
    input.value = '';
    input.style.height = 'auto';
    exchangeCount++;

    appendMsg('user', text);
    history.push({ role: 'user', content: text });

    showTyping();

    try {
      const data = await callAPI(history, subject);
      removeTyping();

      let reply = data.reply || 'Réponse non disponible.';
      
      // Extract scores if present
      let scores = null;
      const jsonMatch = reply.match(/\{"scores":\s*\{[^}]+\}\}/);
      if (jsonMatch) {
        try {
          scores = JSON.parse(jsonMatch[0]).scores;
          reply = reply.replace(jsonMatch[0], '').trim();
        } catch(e) {}
      }

      history.push({ role: 'assistant', content: reply });
      appendMsg('assistant', reply, scores);
    } catch(e) {
      removeTyping();
      appendMsg('assistant', '⚠️ Erreur de connexion au serveur.');
    }

    isLoading = false;
    btn.disabled = false;
    input.focus();
  }

  // Message d'accueil au chargement
  window.addEventListener('load', async () => {
    showTyping();
    try {
      const initMsg = [{ role: 'user', content: 'Commence la simulation. Accueille l\'étudiant.' }];
      const data = await callAPI(initMsg, '');
      removeTyping();
      if (data.reply) {
        history.push({ role: 'assistant', content: data.reply });
        appendMsg('assistant', data.reply);
      }
    } catch(e) {
      removeTyping();
    }
  });
</script>
</body>
</html>
