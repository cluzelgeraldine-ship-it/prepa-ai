<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Jury PrepAI – Préparation d’examen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
      line-height: 1.6;
    }
    .chat {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 1rem;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      margin-bottom: 1rem;
      border: 1px solid #dee2e6;
    }
    .message {
      margin-bottom: 0.75rem;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      max-width: 90%;
    }
    .user { background: #0d6efd; color: white; }
    .ai { background: #e9ecef; color: #212529; }
    .input {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    input {
      flex: 1;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid #dee2e6;
    }
    button {
      background: #0d6efd;
      color: white;
      padding: 0.75rem 1.2rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .config {
      display: flex;
      gap: 1rem 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .config label {
      font-size: 0.9rem;
    }
    .config select, .config input {
      padding: 0.5rem;
      border-radius: 4px;
      border: 1px solid #dee2e6;
    }
  </style>
</head>
<body>
  <h1>🏆 Jury PrepAI</h1>
  <p>Simulateur de jury d’examen – posez une question, le jury vous répond.</p>

  <div class="config">
    <label>
      Type de contexte :
      <select id="context">
        <option value="Étudiant préparant un concours">Étudiant préparant un concours</option>
        <option value="Étudiant en droit">Étudiant en droit</option>
        <option value="Professionnel en reconversion">Professionnel en reconversion</option>
      </select>
    </label>
    <label>
      Mode :
      <select id="mode">
        <option value="CONCOURS">CONCOURS</option>
        <option value="ENTRETIEN">ENTRETIEN</option>
      </select>
    </label>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input">
    <input
      type="text"
      id="message"
      placeholder="Posez une question au jury (ex. : expliquez la responsabilité contractuelle)"
      autofocus
    />
    <button id="send" onclick="sendMessage()">Envoyer</button>
  </div>

  <script>
    const chatEl = document.getElementById("chat");
    const messageEl = document.getElementById("message");
    const contextEl = document.getElementById("context");
    const modeEl = document.getElementById("mode");
    const sendBtn = document.getElementById("send");

    function appendMessage(text, isUser) {
      const div = document.createElement("div");
      div.className = `message ${isUser ? "user" : "ai"}`;
      div.textContent = text;
      chatEl.appendChild(div);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    async function sendMessage() {
      const text = messageEl.value.trim();
      if (!text) return;

      appendMessage(text, true);
      messageEl.value = "";
      sendBtn.disabled = true;

      try {
        const res = await fetch("/api/claude", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: text,
            context: contextEl.value,
            mode: modeEl.value,
          }),
        });

        const data = await res.json();

        if (data.error) {
          appendMessage("⚠️ Erreur : " + data.error, false);
        } else if (data.reply) {
          appendMessage(data.reply, false);
        } else {
          appendMessage("Réponse non disponible.", false);
        }
      } catch (err) {
        appendMessage("Erreur de connexion au serveur.", false);
      } finally {
        sendBtn.disabled = false;
      }
    }

    messageEl.addEventListener("keypress", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // Message d’accueil
    appendMessage("Bonjour, je suis votre jury d’examen. Posez-moi une question.", false);
  </script>
</body>
</html>
