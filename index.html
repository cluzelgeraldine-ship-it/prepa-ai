<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prépa IA · Elite Coach CRFPA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #1a1510; --parchment: #f5f0e8; --gold: #c9a84c; --gold-light: #e8d5a0; --rouge: #8b2020; --cream: #faf7f2; --border: rgba(201,168,76,0.3); }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }
    
    .hero { background: var(--ink); padding: 40px 20px; text-align: center; color: white; position: relative; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--parchment); }
    .hero h1 em { color: var(--gold); font-style: italic; }
    
    .app { max-width: 780px; margin: 0 auto; width: 100%; padding: 20px; flex: 1; display: flex; flex-direction: column; }
    .user-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
    .sims-badge { background: var(--ink); color: var(--gold); padding: 5px 12px; border-radius: 2px; font-size: 12px; font-weight: bold; }
    
    .voice-meter { background: white; border: 1px solid var(--border); padding: 12px; border-radius: 4px; margin: 10px 0; display: flex; align-items: center; gap: 10px; }
    .meter-bar { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
    #speed-fill { height: 100%; width: 0%; background: var(--gold); transition: width 0.2s; }
    
    .chat { flex: 1; overflow-y: auto; padding: 20px 0; display: flex; flex-direction: column; gap: 15px; max-height: 450px; }
    .msg { display: flex; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }
    .bubble { max-width: 80%; padding: 12px; border-radius: 4px; font-size: 14px; line-height: 1.5; border: 1px solid var(--border); }
    .msg.jury .bubble { background: white; border-left: 4px solid var(--gold); }
    .msg.user .bubble { background: var(--ink); color: white; }

    .input-area { padding: 20px 0; display: flex; gap: 10px; align-items: center; }
    textarea { flex: 1; padding: 12px; border: 1px solid var(--border); border-radius: 4px; resize: none; font-family: inherit; }
    .btn-icon { background: var(--ink); color: var(--gold); border: none; width: 46px; height: 46px; cursor: pointer; border-radius: 4px; font-size: 20px; display: flex; align-items: center; justify-content: center; }
    .btn-mic { background: var(--gold); color: var(--ink); }
    .btn-mic.active { background: var(--rouge); color: white; animation: pulse 1.5s infinite; }
    
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    .paywall { text-align: center; padding: 40px; background: white; border: 1px solid var(--border); border-radius: 8px; margin-top: 20px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="hero">
  <h1>Prépa <em>CRFPA</em> · Oral</h1>
  <p style="font-size: 12px; opacity: 0.7; margin-top: 5px;">Entraînement vocal immersif</p>
</div>

<div class="app" id="appSection">
  <div class="user-bar">
    <input type="text" id="subject" style="padding: 5px; border: 1px solid var(--border); width: 60%;" placeholder="Sujet (ex: Droit à l'oubli)">
    <span id="simsBadge" class="sims-badge">3:00</span>
  </div>

  <div id="voiceMonitor" class="voice-meter hidden">
    <span style="font-size: 10px; font-weight: bold;">DÉBIT VOX</span>
    <div class="meter-bar"><div id="speed-fill"></div></div>
  </div>

  <div class="chat" id="chat">
    <div style="text-align:center; color:gray; font-style:italic;">Cliquez sur le micro pour commencer votre plaidoirie...</div>
  </div>

  <div class="input-area">
    <button class="btn-icon btn-mic" id="micBtn" onclick="toggleMic()">🎙️</button>
    <textarea id="userInput" placeholder="Votre réponse..." rows="1"></textarea>
    <button class="btn-icon" onclick="sendMessage()">↑</button>
  </div>
</div>

<div id="paywallSection" class="app hidden">
  <div class="paywall">
    <h2>Diagnostic terminé ⚖️</h2>
    <p>Votre session de 3 minutes est finie. Débloquez le débriefing complet de votre prestation.</p>
    <button style="margin-top:20px; background:var(--gold); padding:15px 30px; border:none; cursor:pointer; font-weight:bold;" onclick="location.reload()">Prendre le Pass Réussite</button>
  </div>
</div>

<script>
  let history = [];
  let isListening = false;
  let simulationStarted = false;
  const TRIAL_TIME = 180;
  
  // Configuration Voix (Reconnaissance)
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = SpeechRecognition ? new SpeechRecognition() : null;
  if(recognition) {
    recognition.lang = 'fr-FR';
    recognition.continuous = false;
  }

  // Configuration Voix (Synthèse)
  const synth = window.speechSynthesis;

  function toggleMic() {
    if (!recognition) return alert("Micro non supporté");
    if (isListening) {
      recognition.stop();
    } else {
      recognition.start();
      document.getElementById('micBtn').classList.add('active');
      isListening = true;
    }
  }

  if(recognition) {
    recognition.onresult = (event) => {
      const text = event.results[0][0].transcript;
      document.getElementById('userInput').value = text;
      sendMessage();
    };
    recognition.onend = () => {
      document.getElementById('micBtn').classList.remove('active');
      isListening = false;
    };
  }

  function startTimer() {
    let timeLeft = TRIAL_TIME;
    document.getElementById('voiceMonitor').classList.remove('hidden');
    const interval = setInterval(() => {
      timeLeft--;
      let mins = Math.floor(timeLeft / 60);
      let secs = timeLeft % 60;
      document.getElementById('simsBadge').textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
      
      // Simulation visuelle du débit
      document.getElementById('speed-fill').style.width = isListening ? (Math.random() * 80 + 20) + '%' : '0%';
      
      if (timeLeft <= 0) {
        clearInterval(interval);
        document.getElementById('appSection').classList.add('hidden');
        document.getElementById('paywallSection').classList.remove('hidden');
        synth.cancel(); // Arrête le jury de parler
      }
    }, 1000);
  }

  function speak(text) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'fr-FR';
    utter.rate = 1.1; 
    utter.pitch = 0.8; // Voix de jury sérieuse
    synth.speak(utter);
  }

  async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;

    if (!simulationStarted) { startTimer(); simulationStarted = true; }

    appendMsg('user', text);
    input.value = '';
    
    try {
      const res = await fetch('/api/claude', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          messages: [...history, {role:'user', content:text}], 
          subject: document.getElementById('subject').value || "Sujet non défini",
          mode: 'PRO'
        })
      });
      const data = await res.json();
      appendMsg('assistant', data.reply);
      history.push({role:'user', content:text}, {role:'assistant', content:data.reply});
      speak(data.reply);
    } catch(e) {
      appendMsg('assistant', "Erreur : Vérifiez votre connexion.");
    }
  }

  function appendMsg(role, content) {
    const chat = document.getElementById('chat');
    const div = document.createElement('div');
    div.className = `msg ${role === 'assistant' ? 'jury' : 'user'}`;
    div.innerHTML = `<div class="bubble">${content}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }
</script>
</body>
</html>
