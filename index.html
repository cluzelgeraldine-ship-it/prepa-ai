<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrepAI | Intelligence Artificielle de Préparation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdfdfd; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-ui { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <div id="setup" class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-white to-slate-50">
        <div class="max-w-xl w-full glass shadow-2xl rounded-[2.5rem] p-8 md:p-12 animate-ui">
            <div class="mb-10 text-center">
                <div class="inline-block bg-blue-600 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest mb-4">Projet Master 2 - Paris 2</div>
                <h1 class="text-4xl font-extrabold tracking-tight text-slate-900">PrepAI Expert</h1>
                <p class="text-slate-500 mt-3 text-lg">Préparez vos oraux et entretiens avec une <span class="text-blue-600 font-semibold">IA spécialisée</span>.</p>
            </div>

            <div class="space-y-6">
                <div class="group">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Collez votre CV ou le sujet de votre oral :</label>
                    <textarea id="cvInput" rows="5" class="w-full p-5 border-2 border-slate-100 rounded-3xl focus:border-blue-500 outline-none transition-all bg-white/50 text-sm shadow-sm" placeholder="Décrivez votre parcours, vos expériences ou vos travaux ici..."></textarea>
                </div>
                
                <button onclick="openSimulator()" class="w-full bg-slate-900 hover:bg-blue-600 text-white font-bold py-5 rounded-3xl transition-all shadow-xl hover:-translate-y-1 active:scale-95 flex items-center justify-center gap-3 text-lg">
                    Lancer l'entraînement vocal
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                </button>
            </div>
            <p class="text-center text-[10px] text-slate-400 mt-10 uppercase tracking-[0.2em] font-medium italic">Propulsé par Claude d'Anthropic • Vercel Edge</p>
        </div>
    </div>

    <div id="simulator" class="hidden fixed inset-0 bg-white z-50 flex flex-col animate-ui">
        <header class="p-5 border-b flex justify-between items-center glass sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse shadow-[0_0_8px_#22c55e]"></div>
                <h2 class="font-bold text-slate-800 text-xs uppercase tracking-widest">Jury IA : Session active</h2>
            </div>
            <button onclick="location.reload()" class="bg-slate-100 hover:bg-red-50 text-slate-600 hover:text-red-600 px-4 py-2 rounded-2xl text-[10px] font-black uppercase transition-all">Quitter</button>
        </header>

        <div id="chat" class="flex-1 overflow-y-auto p-6 md:p-12 space-y-8 max-w-4xl mx-auto w-full"></div>

        <div class="p-6 md:p-10 border-t bg-white">
            <div class="max-w-4xl mx-auto relative flex items-center gap-4">
                <input id="userInput" type="text" onkeypress="if(event.key==='Enter') sendAnswer()" class="w-full p-5 pr-20 border-2 border-slate-100 rounded-[2rem] focus:border-blue-600 outline-none shadow-inner transition-all text-lg bg-slate-50/50" placeholder="Répondez au jury ici...">
                <button onclick="sendAnswer()" class="absolute right-2 p-4 bg-blue-600 text-white rounded-[1.5rem] hover:bg-blue-700 transition-all shadow-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let userCV = "";

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fr-FR';
            utterance.rate = 1.05; 
            window.speechSynthesis.speak(utterance);
        }

        function openSimulator() {
            userCV = document.getElementById('cvInput').value;
            if(!userCV) { alert("Veuillez saisir votre parcours pour commencer."); return; }
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('simulator').classList.remove('hidden');
            addMessage("IA", "Bonjour. J'ai bien analysé les éléments transmis. Pour commencer cet entretien, pourriez-vous vous présenter et m'expliquer votre projet professionnel ?");
        }

        function addMessage(who, text) {
            const chat = document.getElementById('chat');
            const isIA = who === "IA";
            const bubble = `
                <div class="flex ${isIA ? 'justify-start' : 'justify-end'} animate-ui">
                    <div class="max-w-[85%] p-6 rounded-[2rem] shadow-sm ${isIA ? 'bg-slate-50 text-slate-800 rounded-bl-none border border-slate-100' : 'bg-blue-600 text-white rounded-br-none shadow-blue-200'}">
                        <p class="text-[9px] uppercase tracking-widest font-black mb-2 ${isIA ? 'text-blue-600' : 'text-blue-100'}">${who}</p>
                        <p class="text-lg leading-relaxed">${text}</p>
                    </div>
                </div>`;
            chat.innerHTML += bubble;
            chat.scrollTop = chat.scrollHeight;
            if(isIA) speak(text);
        }

        async function sendAnswer() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if(!message) return;
            addMessage("Vous", message);
            input.value = "";
            try {
                const response = await fetch('/api/claude', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, context: userCV })
                });
                const data = await response.json();
                addMessage("IA", data.reply || "Désolé, j'ai eu un problème technique.");
            } catch (error) {
                addMessage("IA", "Impossible de joindre le jury. Vérifiez votre clé API sur Vercel.");
            }
        }
    </script>
</body>
</html>
